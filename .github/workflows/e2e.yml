name: E2E Tests

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday 6am UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run E2E tests
        env:
          FIREBLOCKS_API_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
          FIREBLOCKS_SECRET_KEY: ${{ secrets.FIREBLOCKS_SECRET_KEY }}
          STACKS_NETWORK: TESTNET
          VAULT_A_ID: ${{ secrets.VAULT_A_ID }}
          VAULT_B_ID: ${{ secrets.VAULT_B_ID }}
        run: npm run test:e2e
